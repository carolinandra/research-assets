<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bridge Construction - Inverse Parabolic Haunch</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #eceff1; padding: 20px; }
        .card { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        canvas { background: #fdfdfd; border: 1px solid #cfd8dc; border-radius: 4px; }
        .controls { margin: 20px 0; display: flex; justify-content: center; gap: 15px; }
        button { padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: #007bff; color: white; }
        .btn-blue:hover { background: #0056b3; }
        .btn-red { background: #ef5350; color: white; }
        .info-box { background: #e3f2fd; padding: 15px; border-radius: 8px; border-left: 6px solid #2196f3; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>Construcción: Parábola de Canto (Tangente en Clave)</h2>
    <canvas id="bridgeCanvas" width="900" height="450"></canvas>

    <div class="controls">
        <button class="btn-blue" onclick="changeStage(-1)">Anterior</button>
        <button class="btn-blue" onclick="changeStage(1)">Siguiente Dovela</button>
        <button class="btn-red" onclick="reset()">Reiniciar</button>
    </div>

    <div class="info-box">
        <strong id="stageLabel">Etapa 0</strong>: <span id="stageDesc">Iniciando cimentación.</span>
    </div>
</div>

<script>
    const canvas = document.getElementById('bridgeCanvas');
    const ctx = canvas.getContext('2d');
    const stageLabel = document.getElementById('stageLabel');
    const stageDesc = document.getElementById('stageDesc');

    // --- Technical Configuration ---
    let currentStage = 0;
    const NUM_SEGMENTS = 8; 
    const PIER_HEIGHT = 180;
    const H_PIER = 100;    // Max section height at pier
    const H_TIP = 25;      // Min section height at cantilever tip
    const L_CANTILEVER = 400; 
    const SEG_LEN = L_CANTILEVER / NUM_SEGMENTS;
    const CENTER_X = canvas.width / 2;
    const TOP_Y = 180;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Water/Ground
        ctx.fillStyle = "#bbdefb";
        ctx.fillRect(0, 350, canvas.width, 100);

        // 2. Draw Main Pier (Pila)
        ctx.fillStyle = "#90a4ae";
        ctx.fillRect(CENTER_X - 25, TOP_Y, 50, PIER_HEIGHT);

        if (currentStage === 0) {
            stageLabel.innerText = "Etapa 0";
            stageDesc.innerText = "Pila terminada. Preparación para dovela sobre pila.";
            return;
        }

        // 3. Draw Pier Table (Dovela 0)
        ctx.fillStyle = "#37474f";
        ctx.fillRect(CENTER_X - 30, TOP_Y, 60, H_PIER);

        if (currentStage > 1) {
            // 4. Draw Segments with Inverse Parabolic geometry
            // Formula: H(x) = a * (L - x)^2 + H_tip
            // Where x is the distance from the pier face
            const a = (H_PIER - H_TIP) / Math.pow(L_CANTILEVER, 2);

            for (let i = 1; i < currentStage; i++) {
                ctx.fillStyle = (i % 2 === 0) ? "#455a64" : "#607d8b";
                ctx.strokeStyle = "rgba(255,255,255,0.3)";

                const xStart = 30 + (i - 1) * SEG_LEN;
                const xEnd = 30 + i * SEG_LEN;

                // Calculate heights at start and end of segment using the inverse parabola
                // This makes the curve "flat" at the tip (where distance from pier = L)
                const hStart = a * Math.pow(L_CANTILEVER - (xStart - 30), 2) + H_TIP;
                const hEnd = a * Math.pow(L_CANTILEVER - (xEnd - 30), 2) + H_TIP;

                // Draw Left Segment
                drawSegment(CENTER_X - xStart, CENTER_X - xEnd, hStart, hEnd);
                
                // Draw Right Segment (Symmetry)
                drawSegment(CENTER_X + xStart, CENTER_X + xEnd, hStart, hEnd);
            }
            
            stageLabel.innerText = `Etapa ${currentStage - 1}`;
            stageDesc.innerText = "Colocación de dovelas simétricas. Note cómo la pendiente de la base se suaviza hacia los extremos.";
        }
    }

    function drawSegment(x1, x2, h1, h2) {
        ctx.beginPath();
        ctx.moveTo(x1, TOP_Y);
        ctx.lineTo(x2, TOP_Y);
        ctx.lineTo(x2, TOP_Y + h2);
        ctx.lineTo(x1, TOP_Y + h1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
    }

    function changeStage(val) {
        currentStage = Math.max(0, Math.min(NUM_SEGMENTS + 2, currentStage + val));
        draw();
    }

    function reset() {
        currentStage = 0;
        draw();
    }

    draw();
</script>

</body>
</html>
